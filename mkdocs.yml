site_name: iladub
site_description: "Semantic document compiling — reference implementation of the ET(K)L method"
site_url: https://iladub.dev/
repo_url: https://github.com/iladub/iladub
repo_name: iladub/iladub
copyright: "© 2026 François Rosselet · code Apache-2.0 · vocabulary CC-BY-4.0"

theme:
  name: material
  logo: assets/iladub-icon.png
  favicon: assets/favicon.png
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - The ET(K)L method: etkl.md
  - Architecture: architecture.md
  - Holonic interaction: holonic-interaction.md
  - hol — decision context: hol.md
  - Assertions & propositions: assertion-proposition.md
  - Use case — clinical → FHIR: use-case-fhir.md
  - Naming: naming.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/iladub/iladub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/iladub/
